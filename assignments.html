<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments - Student Life Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-graduation-cap"></i>
      <span>Student Life</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a href="courses.html" class="nav-link">
        <i class="fas fa-book"></i>
        <span>Courses</span>
      </a>
      <a href="assignments.html" class="nav-link active">
        <i class="fas fa-tasks"></i>
        <span>Assignments</span>
      </a>
      <a href="schedule.html" class="nav-link">
        <i class="fas fa-calendar-alt"></i>
        <span>Schedule</span>
      </a>
      <a href="finance.html" class="nav-link">
        <i class="fas fa-wallet"></i>
        <span>Finance</span>
      </a>
      <a href="notes.html" class="nav-link">
        <i class="fas fa-sticky-note"></i>
        <span>Notes</span>
      </a>
      <a href="settings.html" class="nav-link">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-chevron-left"></i>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-wrapper">
    <!-- Top Navbar -->
    <header class="top-navbar">
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search assignments..." id="searchInput">
      </div>
      <div class="navbar-actions">
        <div class="notification-wrapper">
          <button class="notification-btn" id="notificationBtn">
            <i class="fas fa-bell"></i>
            <span class="notification-badge" id="notificationBadge">3</span>
          </button>
          <div class="notification-dropdown" id="notificationDropdown">
            <div class="dropdown-header">
              <h4>Notifications</h4>
              <button class="mark-read">Mark all as read</button>
            </div>
            <div class="notification-list" id="notificationList"></div>
          </div>
        </div>
        <div class="user-profile">
          <img src="https://ui-avatars.com/api/?name=Student&background=10b981&color=fff" alt="User" class="avatar">
          <span class="user-name" id="userName">Student</span>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Assignments</h1>
          <p>Track and manage your assignments</p>
        </div>
        <button class="btn-primary" id="addAssignmentBtn">
          <i class="fas fa-plus"></i> Add Assignment
        </button>
      </div>

      <!-- Filters -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <!-- Assignments Table -->
      <div class="card">
        <div class="table-responsive">
          <table class="data-table" id="assignmentsTable">
            <thead>
              <tr>
                <th>Title</th>
                <th>Course</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="assignmentsBody">
              <!-- Assignments will be loaded here -->
            </tbody>
          </table>
        </div>
        <div class="empty-state" id="emptyAssignments" style="display: none;">
          <i class="fas fa-tasks"></i>
          <p>No assignments yet. Add your first assignment!</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Assignment Modal -->
  <div class="modal" id="assignmentModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="assignmentModalTitle">Add New Assignment</h2>
        <button class="modal-close" id="closeAssignmentModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="assignmentForm">
        <div class="form-group">
          <label for="assignmentTitle">Title</label>
          <input type="text" id="assignmentTitle" required placeholder="e.g., Chapter 5 Review">
        </div>
        <div class="form-group">
          <label for="assignmentCourse">Course</label>
          <select id="assignmentCourse" required>
            <option value="">Select a course</option>
          </select>
        </div>
        <div class="form-group">
          <label for="assignmentDue">Due Date</label>
          <input type="date" id="assignmentDue" required>
        </div>
        <div class="form-group">
          <label for="assignmentStatus">Status</label>
          <select id="assignmentStatus">
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="form-group">
          <label for="assignmentDescription">Description (optional)</label>
          <textarea id="assignmentDescription" rows="3" placeholder="Add any notes..."></textarea>
        </div>
        <input type="hidden" id="assignmentId">
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelAssignment">Cancel</button>
          <button type="submit" class="btn-primary">Save Assignment</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initAssignments();
    });
  </script>
</body>

</html>
