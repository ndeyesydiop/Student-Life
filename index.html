<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Life Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
    <h1>📚 Student Life Manager</h1>
</header>
<main>
    <section id="dashboard">
        <h2>Tableau de bord</h2>
        <p id="message"></p>
        <div>
            <p>Tâches : <span id="nb-taches">0</span></p>
            <p>Dépenses : $<span id="total-depenses">0</span></p>
            <p>Énergie : <span id="energie">100</span></p>
            <p>Stress : <span id="stress">20</span></p>
            <p>Motivation : <span id="motivation">80</span></p>
        </div>
    </section>

    <section id="taches">
        <h2>📝 Gestion des tâches</h2>
        <form id="tacheForm">
            <input type="text" id="tache-input" placeholder="Nouvelle tâche" required>
            <input type="date" id="deadline">
            <button type="submit">Ajouter tâche</button>
        </form>
        <ul id="liste-taches"></ul>
    </section>
    <section id="budget">
        <h2>💰 Gestion du budget</h2>
        <form id="budgetForm">
            <input type="text" id="depense-nom" placeholder="Nom de la dépense" required>
            <input type="number" id="depense-montant" placeholder="Montant $" required>
            <button type="submit">Ajouter dépense</button>
        </form>
        <ul id="liste-depenses"></ul>
        <p>Total : $<span id="total-budget">0</span></p>
    </section>
</main>
<script src="js/script.js"></script>
</body>
</html>
