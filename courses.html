<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - Student Life Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-graduation-cap"></i>
      <span>Student Life</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a href="courses.html" class="nav-link active">
        <i class="fas fa-book"></i>
        <span>Courses</span>
      </a>
      <a href="assignments.html" class="nav-link">
        <i class="fas fa-tasks"></i>
        <span>Assignments</span>
      </a>
      <a href="schedule.html" class="nav-link">
        <i class="fas fa-calendar-alt"></i>
        <span>Schedule</span>
      </a>
      <a href="finance.html" class="nav-link">
        <i class="fas fa-wallet"></i>
        <span>Finance</span>
      </a>
      <a href="notes.html" class="nav-link">
        <i class="fas fa-sticky-note"></i>
        <span>Notes</span>
      </a>
      <a href="settings.html" class="nav-link">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-chevron-left"></i>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-wrapper">
    <!-- Top Navbar -->
    <header class="top-navbar">
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search courses..." id="searchInput">
      </div>
      <div class="navbar-actions">
        <div class="notification-wrapper">
          <button class="notification-btn" id="notificationBtn">
            <i class="fas fa-bell"></i>
            <span class="notification-badge" id="notificationBadge">3</span>
          </button>
          <div class="notification-dropdown" id="notificationDropdown">
            <div class="dropdown-header">
              <h4>Notifications</h4>
              <button class="mark-read">Mark all as read</button>
            </div>
            <div class="notification-list" id="notificationList"></div>
          </div>
        </div>
        <div class="user-profile">
          <img src="https://ui-avatars.com/api/?name=Student&background=10b981&color=fff" alt="User" class="avatar">
          <span class="user-name" id="userName">Student</span>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Courses</h1>
          <p>Manage your courses and track progress</p>
        </div>
        <button class="btn-primary" id="addCourseBtn">
          <i class="fas fa-plus"></i> Add Course
        </button>
      </div>

      <!-- Courses Grid -->
      <div class="courses-grid" id="coursesGrid">
        <!-- Courses will be loaded here -->
      </div>
    </main>
  </div>

  <!-- Add Course Modal -->
  <div class="modal" id="courseModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="courseModalTitle">Add New Course</h2>
        <button class="modal-close" id="closeCourseModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="courseForm">
        <div class="form-group">
          <label for="courseName">Course Name</label>
          <input type="text" id="courseName" required placeholder="e.g., Mathematics 101">
        </div>
        <div class="form-group">
          <label for="courseTeacher">Teacher</label>
          <input type="text" id="courseTeacher" required placeholder="e.g., Dr. Smith">
        </div>
        <div class="form-group">
          <label for="courseProgress">Progress (%)</label>
          <input type="number" id="courseProgress" min="0" max="100" value="0" placeholder="0-100">
        </div>
        <div class="form-group">
          <label for="courseColor">Color</label>
          <select id="courseColor">
            <option value="#10b981">Green</option>
            <option value="#3b82f6">Blue</option>
            <option value="#8b5cf6">Purple</option>
            <option value="#f59e0b">Orange</option>
            <option value="#ef4444">Red</option>
            <option value="#ec4899">Pink</option>
          </select>
        </div>
        <input type="hidden" id="courseId">
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelCourse">Cancel</button>
          <button type="submit" class="btn-primary">Save Course</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initCourses();
    });
  </script>
</body>

</html>
