<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule - Student Life Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-graduation-cap"></i>
      <span>Student Life</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a href="courses.html" class="nav-link">
        <i class="fas fa-book"></i>
        <span>Courses</span>
      </a>
      <a href="assignments.html" class="nav-link">
        <i class="fas fa-tasks"></i>
        <span>Assignments</span>
      </a>
      <a href="schedule.html" class="nav-link active">
        <i class="fas fa-calendar-alt"></i>
        <span>Schedule</span>
      </a>
      <a href="finance.html" class="nav-link">
        <i class="fas fa-wallet"></i>
        <span>Finance</span>
      </a>
      <a href="notes.html" class="nav-link">
        <i class="fas fa-sticky-note"></i>
        <span>Notes</span>
      </a>
      <a href="settings.html" class="nav-link">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-chevron-left"></i>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-wrapper">
    <!-- Top Navbar -->
    <header class="top-navbar">
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
      </button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search..." id="searchInput">
      </div>
      <div class="navbar-actions">
        <div class="notification-wrapper">
          <button class="notification-btn" id="notificationBtn">
            <i class="fas fa-bell"></i>
            <span class="notification-badge" id="notificationBadge">3</span>
          </button>
          <div class="notification-dropdown" id="notificationDropdown">
            <div class="dropdown-header">
              <h4>Notifications</h4>
              <button class="mark-read">Mark all as read</button>
            </div>
            <div class="notification-list" id="notificationList"></div>
          </div>
        </div>
        <div class="user-profile">
          <img src="https://ui-avatars.com/api/?name=Student&background=10b981&color=fff" alt="User" class="avatar">
          <span class="user-name" id="userName">Student</span>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Schedule</h1>
          <p>Your weekly timetable</p>
        </div>
        <button class="btn-primary" id="addScheduleBtn">
          <i class="fas fa-plus"></i> Add Class
        </button>
      </div>

      <!-- Schedule Grid -->
      <div class="schedule-container">
        <div class="schedule-grid" id="scheduleGrid">
          <div class="schedule-header">
            <div class="time-header">Time</div>
            <div class="day-header">Monday</div>
            <div class="day-header">Tuesday</div>
            <div class="day-header">Wednesday</div>
            <div class="day-header">Thursday</div>
            <div class="day-header">Friday</div>
            <div class="day-header">Saturday</div>
            <div class="day-header">Sunday</div>
          </div>
          <div class="schedule-body" id="scheduleBody">
            <!-- Time slots will be generated here -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Schedule Modal -->
  <div class="modal" id="scheduleModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="scheduleModalTitle">Add Class</h2>
        <button class="modal-close" id="closeScheduleModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="scheduleForm">
        <div class="form-group">
          <label for="scheduleClass">Course</label>
          <select id="scheduleClass" required>
            <option value="">Select a course</option>
          </select>
        </div>
        <div class="form-group">
          <label for="scheduleDay">Day</label>
          <select id="scheduleDay" required>
            <option value="monday">Monday</option>
            <option value="tuesday">Tuesday</option>
            <option value="wednesday">Wednesday</option>
            <option value="thursday">Thursday</option>
            <option value="friday">Friday</option>
            <option value="saturday">Saturday</option>
            <option value="sunday">Sunday</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="scheduleStart">Start Time</label>
            <input type="time" id="scheduleStart" required>
          </div>
          <div class="form-group">
            <label for="scheduleEnd">End Time</label>
            <input type="time" id="scheduleEnd" required>
          </div>
        </div>
        <div class="form-group">
          <label for="scheduleRoom">Room (optional)</label>
          <input type="text" id="scheduleRoom" placeholder="e.g., Room 101">
        </div>
        <input type="hidden" id="scheduleId">
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelSchedule">Cancel</button>
          <button type="submit" class="btn-primary">Save Class</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initSchedule();
    });
  </script>
</body>

</html>
